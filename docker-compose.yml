services:
  backend:
    image: us-central1-docker.pkg.dev/surf-weather-492803/web/backend
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/config:/app/config:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - surf_net

  frontend:
    image: us-central1-docker.pkg.dev/surf-weather-492803/web/frontend
    build:
      context: ./frontend
    ports:
      - "8080:80"
    environment:
      - BACKEND_URL=http://backend:8000
      - PORT=80
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - surf_net

  frontend-test:
    build:
      context: ./frontend
      target: build
    command: npm test
    profiles: ["test"]

networks:
  surf_net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1400"
